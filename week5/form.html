<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Product Review</title>
    <link rel="stylesheet" href="style/form.css">
    <link rel="stylesheet" href="style/large-form.css">
    <meta name="description" content="A product review form that allows users to submit their feedback on a product, including ratings, features, and written reviews.">
    <meta name="author" content="Gideon Edet">
</head>
<body>

<header>
    <h1>Product Review</h1>
</header>

<main>
    <form method="get" action="review.html">

        <label for="product">Product Name</label>
        <select id="product" name="product" required>
            <option value="" disabled selected>Select a Product ...</option>
            <option value="product1">Product 1</option>
            <option value="product2">Product 2</option>
            <option value="product3">Product 3</option>
        </select>

        <fieldset>
            <legend>Overall Rating</legend>

            <label for="rating1">★</label>
            <input type="radio" id="rating1" name="rating" value="1" required>

            <label for="rating2">★★</label>
            <input type="radio" id="rating2" name="rating" value="2" required>

            <label for="rating3">★★★</label>
            <input type="radio" id="rating3" name="rating" value="3" required>

            <label for="rating4">★★★★</label>
            <input type="radio" id="rating4" name="rating" value="4" required>

            <label for="rating5">★★★★★</label>
            <input type="radio" id="rating5" name="rating" value="5" required>
        </fieldset>

        <label for="installDate">Date of Installation</label>
        <input type="date" id="installDate" name="installDate" required>

        <fieldset>
            <legend>
                Which features did you find useful in the product?
            </legend>

            <label for="durability">
                <input type="checkbox" id="durability" name="features" value="Durability">
                Durability
            </label>

            <label for="ease">
                <input type="checkbox" id="ease" name="features" value="Ease of Use">
                Ease of Use
            </label>

            <label for="performance">
                <input type="checkbox" id="performance" name="features" value="Performance">
                Performance
            </label>

            <label for="design">
                <input type="checkbox" id="design" name="features" value="Design">
                Design
            </label>
        </fieldset>

        <label for="review">
            Written Review (Optional)
        </label>

        <textarea id="review" name="review" rows="5"></textarea>

        <label for="userName">
            Your Name (Optional)
        </label>

        <input type="text" id="userName" name="userName">

        <button type="submit">Post Review</button>

    </form>
</main>

    <footer>
        <p>©2026 Gideon Edet</p>
        <p>Nigeria</p>
        <p id="lastModified"></p>
    </footer>

<script src="script/form.js" defer></script>
</body>
</html>
