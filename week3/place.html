
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nigeria Place Page</title>
    <link rel="stylesheet" href="./styles/place.css">
    <link rel="stylesheet" href="./styles/place-large.css">
    <script src="./scripts/place.js" defer></script>

</head>

<body>

<header>
    <h1>Nigeria</h1>
</header>

<main class="hero">
        <img src="./images/nigeria.jpg" alt="Beautiful View of Nigeria">

    

    <section class="card data-card">

        <h2>Data</h2>
        <p><strong>Area:</strong>923,769 sq km</p>
        <p><strong>Population:</strong>223 Million</p>
        <p><strong>Capital:</strong>Abuja</p>
        <p><strong>Languages:</strong>English, Hausa, Yoruba, Igbo</p>
        <p><strong>Currency:</strong>Nigerian Naira</p>
        <p><strong>Time Zone:</strong>UTC+1</p>
        <p><strong>Calling Code:</strong>+234</p>
        <p><strong>Internet TLD:</strong>.ng</p>

    </section>

    <section class="card weather-card weather">

        <h2>Weather</h2>
        <img src="./images/weather.svg" alt="Weather Icon" class="weather-icon">
        <p><strong>Temperature:</strong><span id="temp">32</span> °C</p>
        <p><strong>Conditions:</strong>Sunny</p>
        <p><strong>Wind:</strong><span id="speed">8</span> km/h</p>
        <p><strong>Wind Chill:</strong><span id="windchill"></span></p>

    </section>

</main>

<footer>
    <p>&copy;<span id="current-year"></span>🌍 Gideon Edet 🌍 Nigeria</p>
    <p id="lastModified"></p>
</footer>

</body>
</html>
